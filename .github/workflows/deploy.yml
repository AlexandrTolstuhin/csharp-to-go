name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          LATEST=$(curl -s https://api.github.com/repos/rust-lang/mdBook/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${LATEST}/mdbook-${LATEST}-x86_64-unknown-linux-musl.tar.gz" | tar -xz -C /usr/local/bin

      - name: Install mdbook-mermaid
        run: |
          LATEST=$(curl -s https://api.github.com/repos/badboy/mdbook-mermaid/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSL "https://github.com/badboy/mdbook-mermaid/releases/download/${LATEST}/mdbook-mermaid-${LATEST}-x86_64-unknown-linux-musl.tar.gz" | tar -xz -C /usr/local/bin
          # install кладёт JS-файлы в src (= корень при src = ".")
          mdbook-mermaid install .

      - name: Build
        run: mdbook build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book
